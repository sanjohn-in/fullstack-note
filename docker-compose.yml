services:
  backend:
    build: ./Backend
    ports:
      - "5174:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=127.0.0.1;Port=3306;Database=techbodia;User=techbodia;Password=Techbodia@2026;
    extra_hosts:
      - "host.docker.internal:host-gateway"  # ← lets Docker reach host MySQL
    restart: always

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always