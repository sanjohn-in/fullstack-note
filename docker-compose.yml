services:
  backend:
    build: ./Backend
    ports:
      - "5174:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Port=3306;Database=techbodia;User=techbodia;Password=Techbodia@2026;
      - Jwt__Key=THIS_IS_A_SUPER_SECRET_KEY_12345
      - Jwt__Issuer=BackendApi
      - Jwt__Audience=BackendApiUser
      - Jwt__ExpireMinutes=60
      - ASPNETCORE_ENVIRONMENT=Production
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ← this bridges Docker to aaPanel MySQL
    restart: always

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

# ← mysql service completely removed
# no volumes needed either