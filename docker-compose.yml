  #     - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    depends_on:
      - mysql
    environment:
      - NODE_OPTIONS=--max-old-space-size=384 
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "8000:5173"
    environment:
      - NODE_OPTIONS=--max-old-space-size=384
    depends_on:
      - backend
    restart: always

