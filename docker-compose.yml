services:

  mysql:
    image: mysql:8
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Techbodia@2026
      MYSQL_DATABASE: techbodia
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always


  backend:
    build: ./Backend
    ports:
      - "5174:9000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:9000
    restart: always

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

