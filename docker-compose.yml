services:

sqlserver:
  image: mcr.microsoft.com/azure-sql-edge:latest
  # platform: linux/arm64
  container_name: notesapp_sqlserver
  restart: always
  environment:
    ACCEPT_EULA: "1"
    MSSQL_SA_PASSWORD: "Techbodia@2026"
    MSSQL_PID: "Developer"
  ports:
    - "1433:1433"
  volumes:
    - sqlserver_data:/var/opt/mssql
 
  backend:
    build: ./Backend
    container_name: notesapp_backend
    ports:
      - "5174:8080"
    depends_on:
      sqlserver:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=techbodia;User Id=sa;Password=Techbodia@2026;TrustServerCertificate=True;
      - Jwt__Key=THIS_IS_A_SUPER_SECRET_KEY_12345
      - Jwt__Issuer=BackendApi
      - Jwt__Audience=BackendApiUser
    restart: always

  frontend:
    build: ./Frontend
    container_name: notesapp_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

volumes:
  sqlserver_data: